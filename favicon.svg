<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a40"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="sun" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffe066"/>
      <stop offset="100%" style="stop-color:#ff9a00"/>
    </linearGradient>
  </defs>
  <!-- Sky background -->
  <rect width="64" height="64" rx="14" fill="url(#sky)"/>
  <!-- Ground line -->
  <rect x="4" y="42" width="56" height="3" rx="1.5" fill="rgba(255,255,255,0.25)"/>
  <!-- Sun (half circle rising) -->
  <clipPath id="aboveGround">
    <rect x="0" y="0" width="64" height="43"/>
  </clipPath>
  <circle cx="32" cy="43" r="12" fill="url(#sun)" clip-path="url(#aboveGround)"/>
  <!-- Sun rays -->
  <g stroke="#ffe066" stroke-width="2" stroke-linecap="round" opacity="0.85">
    <line x1="32" y1="16" x2="32" y2="12"/>
    <line x1="46" y1="20" x2="49" y2="17"/>
    <line x1="18" y1="20" x2="15" y2="17"/>
    <line x1="51" y1="32" x2="55" y2="32"/>
    <line x1="13" y1="32" x2="9" y2="32"/>
    <line x1="46" y1="38" x2="49.5" y2="41"/>
    <line x1="18" y1="38" x2="14.5" y2="41"/>
  </g>
  <!-- Horizon glow -->
  <ellipse cx="32" cy="42" rx="24" ry="5" fill="#ff6b35" opacity="0.45"/>
  <!-- "A" letter subtle -->
  <text x="32" y="60" font-family="Arial,sans-serif" font-size="10" font-weight="bold" fill="rgba(255,255,255,0.7)" text-anchor="middle">ATT</text>
</svg>
